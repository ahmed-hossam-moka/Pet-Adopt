name: Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Clones your repository into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Installs .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Downloads NuGet packages
      - name: Restore dependencies
        run: dotnet restore PetAdopt.sln

      # Compiles the whole solution
      - name: Build
        run: dotnet build PetAdopt.sln --configuration Release --no-restore

      # Runs tests if you have test projects
      - name: Test
        run: dotnet test PetAdopt.sln --configuration Release --no-build

      # Publishes the API project into a deployable folder
      - name: Publish
        run: dotnet publish ./PetAdopt.API/PetAdopt.API.csproj -c Release -o ./publish

      # Uploads the published files as a GitHub Actions artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: petadopt-api
          path: ./publish