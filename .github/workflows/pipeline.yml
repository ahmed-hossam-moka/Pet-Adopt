name: Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./BackEnd/PetAdopt.slnx

      - name: Build
        run: dotnet build ./BackEnd/PetAdopt.sln --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./BackEnd/PetAdopt.API/PetAdopt.API.csproj -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: petadopt-api
          path: ./publish
